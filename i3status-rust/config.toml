[icons]
icons = "material-nf"

[theme]
theme = "slick"

[theme.overrides]
idle_bg = "#282a36"
idle_fg = "#f8f8f2"
info_bg = "#282a36"
info_fg = "#f8f8f2"
good_bg = "#282a36"
good_fg = "#f8f8f2"
warning_bg = "#282a36"
warning_fg = "#f1fa8c"
critical_bg = "#282a36"
critical_fg = "#ff5555"
separator = "\ue0b2"
separator_bg = "auto"
separator_fg = "auto"

[[block]]
block = "backlight"
# Hardware-specific: adjust per machine
device = "amdgpu_bl1"
invert_icons = true

[[block]]
block = "disk_space"
path = "/"
info_type = "available"
format = " $icon  $used/$total ($available) "

[[block]]
block = "temperature"
interval = 5
format = " $icon {$average}C "
chip = "*-isa-*"

[[block]]
block = "net"
# Hardware-specific: adjust per machine
device = "wlp1s0"
format = " $icon  $speed_down $speed_up "
interval = 5

[[block]]
block = "memory"
format = " $icon $mem_used/$mem_total ($mem_used_percents) "

[[block]]
block = "cpu"
interval = 5
format = " $icon $utilization ($frequency) "

[[block]]
block = "sound"
driver = "auto"
format = " $icon  $volume "

[[block.click]]
button = "left"
cmd = "pavucontrol"

[[block]]
block = "battery"
format = " $icon  $percentage "
charging_format = " $icon  $percentage "
full_format = " $icon  $percentage "
not_charging_format = " $icon  $percentage "
empty_format = " $icon  $percentage "
driver = "upower"

[[block.click]]
button = "left"
cmd = "dunstify 'Battery' \"$(upower -i /org/freedesktop/UPower/devices/battery_BAT0)\""

[[block]]
block = "time"
interval = 1
format = " $icon $timestamp.datetime(f:'%H:%M:%S   %a %-d %b W%V') "
