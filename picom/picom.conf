shadow = true;
shadow-radius = 3;
shadow-opacity = .28
shadow-offset-x = -1;
shadow-offset-y = 0;
shadow-exclude = [];

fading = true
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5
fade-exclude = []

inactive-opacity = 0.8;
frame-opacity = 0.7;
inactive-opacity-override = false;
focus-exclude = [];

opacity-rule = [
  "100:class_g = 'Googleearth'",
  "100:class_g = 'Google-chrome'",
  "100:class_g = 'X-Plane'",
  "100:class_g *= 'Shadow PC'",
];

blur: {
  method = "box";
  size = 3;
};
blur-background-exclude = [];

backend = "glx";
vsync = true
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
unredir-if-possible = true
detect-transient = true
detect-client-leader = true
use-damage = true
log-level = "warn";

wintypes:
{
  unknown = { opacity = 0.93; }
  toolbar = { opacity = 0.93; }
  desktop = { opacity = 0.93; }
  menu = { opacity = 0.93; }
  utility = { opacity = 0.93; }
  splash = { opacity = 0.93; }
  dialog = { opacity = 0.93; }
  normal = { opacity = 0.93; }
  tooltip = { fade = true; shadow = true; opacity = 0.75; focus = true; full-shadow = false; };
  dock = { shadow = false; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 0.8; }
  dropdown_menu = { opacity = 0.8; }
};
